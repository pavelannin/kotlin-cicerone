apply plugin: 'kotlin'

// This is important even if Android Studio claims it isn't
// used. Android can't interpret Java 8 byte code.
sourceCompatibility = JavaVersion.VERSION_1_7
targetCompatibility = JavaVersion.VERSION_1_7

sourceSets {
    main.java.srcDirs += 'src/main/kotlin'
}

dependencies {
    implementation group: 'org.jetbrains.kotlin', name: 'kotlin-stdlib', version: kotlin_version

    compileOnly project(':stub-android')
    compileOnly group: 'com.google.android', name: 'android', version: '4.1.1.4'
}

ext {
    // This params is for the library uploading to the Bintray
    bintrayRepo = 'android'
    bintrayName = 'kotlin-cicerone'
    publishedGroupId = 'com.github.pavelannin'
    artifact = 'cicerone-ktx'
    libraryVersion = '5.0.1'
    gitUrl = 'https://github.com/pavelannin/kotlin-cicerone'
    allLicenses = ['MIT']
}

// Configuration of the library uploading to the Bintray
// Note: Call 'bintrayUpload' task (it will execute 'install' task first)
// I try to include as little properties as possible in these files
project.archivesBaseName ='cicerone-ktx' // to fix that project name different from artifact name
apply from: 'androidmaven.gradle'
apply from: 'bintray.gradle'

// Tasks for sources and javadocs jars
task sourcesJar(type: Jar) {
    archiveClassifier.set('sources')
    from sourceSets.main.java.srcDirs
}

task javadocJar(type: Jar, dependsOn: javadoc) {
    archiveClassifier.set('javadoc')
    from javadoc.destinationDir
}
artifacts {
    archives javadocJar
    archives sourcesJar
}